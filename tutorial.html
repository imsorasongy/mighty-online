<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이티 규칙학습</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: radial-gradient(ellipse at center, #1a5c2a 0%, #0e3d18 50%, #082610 100%);
  color: #f0f0f0;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
}
#app {
  max-width: 640px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100vh;
}

/* Header */
.header {
  text-align: center;
  padding: 16px 0;
  border-bottom: 2px solid rgba(255,215,0,0.3);
  margin-bottom: 20px;
}
.header h1 { font-size: 28px; color: #FFD700; letter-spacing: 4px; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
.header p { color: #aaa; font-size: 13px; margin-top: 4px; }

/* Progress */
.progress { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 8px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #FFD700, #FFA000); border-radius: 3px; transition: width 0.4s; }
.step-info { text-align: center; color: #888; font-size: 12px; margin-bottom: 16px; }

/* Lesson */
.lesson { display: none; animation: fadeIn 0.4s; }
.lesson.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.lesson h2 { color: #FFD700; font-size: 22px; text-align: center; margin-bottom: 14px; }
.lesson h3 { color: #4FC3F7; font-size: 17px; margin: 14px 0 8px; }
.lesson p { font-size: 14px; line-height: 1.8; margin-bottom: 10px; color: #ddd; }
.lesson ul { margin: 6px 0 12px 18px; line-height: 1.8; color: #ccc; font-size: 14px; }

/* Boxes */
.info { background: rgba(0,150,255,0.12); border: 1px solid rgba(0,150,255,0.3); border-radius: 8px; padding: 12px 14px; margin: 12px 0; font-size: 13px; line-height: 1.7; }
.warn { background: rgba(255,100,0,0.12); border: 1px solid rgba(255,100,0,0.3); border-radius: 8px; padding: 12px 14px; margin: 12px 0; font-size: 13px; line-height: 1.7; }
.example { background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.25); border-radius: 8px; padding: 12px 14px; margin: 12px 0; font-size: 13px; line-height: 1.7; }

/* Cards */
.cards { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 14px 0; }
.card {
  width: 52px; height: 74px; background: #fff; border-radius: 6px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  cursor: default; transition: all 0.2s; position: relative; user-select: none;
}
.card .r { font-size: 15px; }
.card .s { font-size: 18px; }
.card.red { color: #d00; }
.card.black { color: #111; }
.card.joker { background: linear-gradient(135deg,#fff,#ffe0f0); border: 2px solid #e040fb; }
.card.mighty { border: 2px solid #FFD700; box-shadow: 0 0 10px rgba(255,215,0,0.4); }
.card.clickable { cursor: pointer; border: 2px solid #555; }
.card.clickable:hover { transform: translateY(-6px); box-shadow: 0 4px 16px rgba(255,215,0,0.3); border-color: #FFD700; }
.card.selected { transform: translateY(-8px); border-color: #4FC3F7; box-shadow: 0 0 14px rgba(0,150,255,0.5); }
.card.correct { border-color: #4caf50; box-shadow: 0 0 14px rgba(76,175,80,0.6); }
.card.wrong { border-color: #f44336; box-shadow: 0 0 14px rgba(244,67,54,0.6); opacity: 0.6; }
.card.dimmed { opacity: 0.3; }
.card-label { text-align: center; font-size: 11px; color: #aaa; margin-top: 3px; }
.card-back {
  width: 52px; height: 74px; border-radius: 6px;
  background: linear-gradient(135deg, #1a3a8a, #0d2266);
  border: 2px solid #4a6aaa;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

/* Quiz */
.quiz-area { margin: 16px 0; }
.quiz-prompt {
  background: rgba(0,0,0,0.4); border: 1px solid rgba(255,215,0,0.3); border-radius: 10px;
  padding: 14px; text-align: center; font-size: 15px; font-weight: bold; color: #FFD700;
  margin-bottom: 14px;
}
.quiz-result {
  text-align: center; font-size: 15px; font-weight: bold; margin: 14px 0;
  padding: 12px; border-radius: 8px; display: none;
}
.quiz-result.correct { display: block; background: rgba(76,175,80,0.2); border: 1px solid #4caf50; color: #8bc34a; }
.quiz-result.wrong { display: block; background: rgba(244,67,54,0.2); border: 1px solid #f44336; color: #ef5350; }
.quiz-explain { font-size: 13px; color: #aaa; text-align: center; margin-top: 8px; line-height: 1.6; }

/* Trick display */
.trick-area {
  background: rgba(0,0,0,0.3); border-radius: 12px; padding: 14px;
  margin: 14px 0; text-align: center;
}
.trick-label { font-size: 12px; color: #aaa; margin-bottom: 8px; }
.trick-cards { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.trick-card-wrap { text-align: center; }
.trick-card-wrap .player-name { font-size: 11px; color: #ccc; margin-bottom: 3px; }

/* Scenario */
.scenario-box {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.2);
  border-radius: 10px; padding: 12px; margin: 12px 0;
}
.scenario-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 3px 0; }
.scenario-row .label { color: #aaa; }
.scenario-row .value { color: #FFD700; font-weight: bold; }

/* Buttons */
.btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 14px 0; }
.btn {
  padding: 10px 22px; border: 2px solid #555; background: #1a2a1a; color: #e0e0e0;
  border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.15s;
}
.btn:hover { background: #2a4a2a; border-color: #FFD700; color: #FFD700; }
.btn.primary { background: #FFD700; color: #0d1a0d; border-color: #FFD700; }
.btn.primary:hover { background: #ffec80; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Nav */
.nav { display: flex; justify-content: space-between; margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); }

/* Table */
.tbl { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
.tbl th, .tbl td { padding: 7px 10px; border-bottom: 1px solid #333; text-align: center; }
.tbl th { color: #FFD700; background: rgba(0,0,0,0.3); }

/* Flow */
.flow { display: flex; align-items: center; justify-content: center; gap: 6px; margin: 14px 0; flex-wrap: wrap; }
.flow-box { background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.4); border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: bold; color: #FFD700; text-align: center; }
.flow-arr { color: #888; font-size: 16px; }

/* Hand area */
.hand-area { margin: 14px 0; }
.hand-label { font-size: 13px; color: #aaa; text-align: center; margin-bottom: 6px; }

@media (max-width: 480px) {
  .card { width: 44px; height: 62px; }
  .card .r { font-size: 13px; }
  .card .s { font-size: 15px; }
  .lesson h2 { font-size: 19px; }
  .card-back { width: 44px; height: 62px; }
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>MIGHTY</h1>
    <p>규칙학습</p>
  </div>
  <div class="progress"><div class="progress-fill" id="prog"></div></div>
  <div class="step-info" id="stepInfo"></div>
  <div id="lessons"></div>
  <div class="nav">
    <button class="btn" id="prevBtn" onclick="prev()">&larr; 이전</button>
    <button class="btn" id="tocBtn" onclick="go(0)">목차</button>
    <button class="btn primary" id="nextBtn" onclick="next()">다음 &rarr;</button>
  </div>
</div>

<script>
// Card helpers
const SUITS = {spades:'&spades;', hearts:'&hearts;', diamonds:'&diams;', clubs:'&clubs;'};
const SCOLOR = {spades:'black', hearts:'red', diamonds:'red', clubs:'black'};
function C(rank, suit, cls='') {
  if (rank === 'JK') return `<div class="card joker ${cls}" ${cls.includes('clickable')?'':''}><span class="r">JK</span><span class="s" style="color:#e040fb">&#9733;</span></div>`;
  const c = SCOLOR[suit];
  const mighty = cls.includes('mighty');
  return `<div class="card ${c} ${cls} ${mighty?'mighty':''}" data-card="${rank}_${suit}"><span class="r">${rank}</span><span class="s">${SUITS[suit]}</span></div>`;
}
function CBack() { return `<div class="card-back"></div>`; }

// Lessons data
const lessons = [];

// L0: TOC
lessons.push({
  render() {
    return `
    <h2>마이티를 배워봅시다!</h2>
    <p style="text-align:center;color:#aaa;margin-bottom:16px">각 단계에서 설명을 읽고, 퀴즈를 풀면서 규칙을 익혀보세요.</p>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${['게임 개요','특수 카드: 마이티 & 조커','게임 흐름과 입찰','카드 교환과 기루다',
         '프렌드 선택','트릭 플레이 기초','실습: 낼 수 있는 카드 고르기','카드 강약 비교',
         '실습: 어떤 카드가 이길까?','조커콜','실습: 조커콜 상황','점수 계산','전략 팁과 마무리'
        ].map((t,i) => `<a onclick="go(${i+1})" style="display:block;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#ccc;font-size:14px;cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor='rgba(255,215,0,0.4)';this.style.color='#FFD700'" onmouseout="this.style.borderColor='rgba(255,255,255,0.1)';this.style.color='#ccc'"><span style="color:#FFD700;margin-right:8px;font-weight:bold">${i+1}</span>${t}${t.startsWith('실습')?'<span style="color:#4caf50;font-size:11px;margin-left:6px">INTERACTIVE</span>':''}</a>`).join('')}
    </div>`;
  }
});

// L1: 게임 개요
lessons.push({
  render() {
    return `
    <h2>1. 게임 개요</h2>
    <p><strong>마이티</strong>는 5명이 플레이하는 트릭 테이킹 카드게임입니다. 53장(조커 포함)을 사용합니다.</p>
    <div class="info">
      <strong>팀 구성:</strong><br>
      <span style="color:#FFD700">여당 (공격)</span> = 주공 + 프렌드 (2명)<br>
      <span style="color:#4FC3F7">야당 (수비)</span> = 나머지 3명
    </div>
    <p>주공 팀은 공약한 수 이상의 <strong>점수 카드</strong>(A, K, Q, J, 10)를 모으면 승리합니다.</p>
    <p>점수 카드는 각 문양 5장씩, 총 <strong>20장</strong>입니다.</p>
    <div class="cards">
      ${C('A','spades')} ${C('K','hearts')} ${C('Q','diamonds')} ${C('J','clubs')} ${C('10','spades')}
    </div>
    <div class="card-label">점수 카드 예시 (A, K, Q, J, 10)</div>`;
  }
});

// L2: 특수 카드
lessons.push({
  render() {
    return `
    <h2>2. 특수 카드</h2>
    <h3>마이티 (Mighty) - 최강의 카드</h3>
    <div class="cards">
      <div style="text-align:center">${C('A','spades','mighty')}<div class="card-label">기본 마이티</div></div>
      <div style="text-align:center">${C('A','diamonds','mighty')}<div class="card-label">스페이드 기루다일 때</div></div>
    </div>
    <p>마이티는 <strong>어떤 카드보다 강합니다</strong>. 기루다가 스페이드이면 다이아A, 그 외엔 스페이드A가 마이티입니다.</p>

    <h3>조커 (Joker) - 2번째로 강한 카드</h3>
    <div class="cards">${C('JK')}</div>
    <p>마이티 다음으로 강합니다. 리드 시 원하는 문양을 선언할 수 있습니다.</p>
    <div class="warn"><strong>주의:</strong> 첫 번째 트릭(1턴)과 마지막 트릭(10턴)에서는 조커의 효력이 <strong>없습니다!</strong></div>

    <div class="quiz-area" id="q2"></div>`;
  },
  initQuiz() {
    const q = document.getElementById('q2');
    q.innerHTML = `
      <div class="quiz-prompt">퀴즈: 기루다가 하트일 때, 마이티는 어떤 카드일까요?</div>
      <div class="cards">
        <div onclick="checkQ2(this,'wrong')" class="card black clickable" data-a="1"><span class="r">A</span><span class="s">&hearts;</span></div>
        <div onclick="checkQ2(this,'correct')" class="card black clickable" data-a="2"><span class="r">A</span><span class="s">&spades;</span></div>
        <div onclick="checkQ2(this,'wrong')" class="card red clickable" data-a="3"><span class="r">A</span><span class="s">&diams;</span></div>
        <div onclick="checkQ2(this,'wrong')" class="card joker clickable" data-a="4"><span class="r">JK</span><span class="s" style="color:#e040fb">&#9733;</span></div>
      </div>
      <div class="quiz-result" id="q2r"></div>`;
    window.checkQ2 = (el, ans) => {
      q.querySelectorAll('.card').forEach(c => { c.classList.remove('clickable'); c.style.cursor='default'; });
      if (ans === 'correct') {
        el.classList.add('correct');
        document.getElementById('q2r').className = 'quiz-result correct';
        document.getElementById('q2r').innerHTML = '정답! 기루다가 스페이드가 아니면 스페이드A가 마이티입니다.';
      } else {
        el.classList.add('wrong');
        q.querySelectorAll('.card')[1].classList.add('correct');
        document.getElementById('q2r').className = 'quiz-result wrong';
        document.getElementById('q2r').innerHTML = '오답! 기루다가 하트이므로 마이티는 <strong>스페이드A</strong>입니다.<br><span class="quiz-explain">기루다가 스페이드일 때만 다이아A가 마이티가 됩니다.</span>';
      }
    };
  }
});

// L3: 게임 흐름과 입찰
lessons.push({
  render() {
    return `
    <h2>3. 게임 흐름과 입찰</h2>
    <div class="flow">
      <div class="flow-box">카드 배분</div><div class="flow-arr">&rarr;</div>
      <div class="flow-box">입찰</div><div class="flow-arr">&rarr;</div>
      <div class="flow-box">카드 교환</div><div class="flow-arr">&rarr;</div>
      <div class="flow-box">프렌드</div><div class="flow-arr">&rarr;</div>
      <div class="flow-box">10트릭</div><div class="flow-arr">&rarr;</div>
      <div class="flow-box">점수</div>
    </div>
    <h3>입찰 (Bidding)</h3>
    <p>각 플레이어가 순서대로 <strong>"기루다 + 점수카드 목표 장수"</strong>를 선언합니다.</p>
    <ul>
      <li>최소 공약: <strong>13장</strong></li>
      <li>이전보다 높은 수를 불러야 합니다</li>
      <li>자신 없으면 <strong>패스</strong></li>
      <li>가장 높은 공약 = <strong>주공</strong></li>
    </ul>
    <div class="example">예: "스페이드 14" = 스페이드를 기루다로 하고, 점수카드 14장 이상 모으겠다</div>
    <div class="quiz-area" id="q3"></div>`;
  },
  initQuiz() {
    const q = document.getElementById('q3');
    q.innerHTML = `
      <div class="quiz-prompt">퀴즈: 이전 사람이 "하트 14"를 불렀습니다. 다음 중 부를 수 있는 공약은?</div>
      <div class="btn-row">
        <button class="btn" onclick="checkQ3(this,false)">하트 13</button>
        <button class="btn" onclick="checkQ3(this,false)">스페이드 14</button>
        <button class="btn" onclick="checkQ3(this,true)">클럽 15</button>
        <button class="btn" onclick="checkQ3(this,false)">패스만 가능</button>
      </div>
      <div class="quiz-result" id="q3r"></div>`;
    window.checkQ3 = (el, correct) => {
      q.querySelectorAll('.btn').forEach(b => b.disabled = true);
      if (correct) {
        el.style.borderColor = '#4caf50'; el.style.color = '#4caf50';
        document.getElementById('q3r').className = 'quiz-result correct';
        document.getElementById('q3r').textContent = '정답! 이전보다 높은 수(15 이상)를 불러야 합니다.';
      } else {
        el.style.borderColor = '#f44336'; el.style.color = '#f44336';
        document.getElementById('q3r').className = 'quiz-result wrong';
        document.getElementById('q3r').innerHTML = '오답! 이전 공약(14)보다 높은 <strong>15 이상</strong>만 부를 수 있습니다. 또는 패스할 수 있습니다.';
      }
    };
  }
});

// L4: 카드 교환과 기루다
lessons.push({
  render() {
    return `
    <h2>4. 카드 교환과 기루다</h2>
    <p>주공은 바닥패 3장을 가져온 뒤 (13장), 3장을 골라 버립니다.</p>
    <div class="info">버린 카드 중 점수 카드는 주공 팀의 점수에 자동 포함됩니다!</div>
    <h3>기루다 변경</h3>
    <p>교환 후 기루다를 바꿀 수 있지만, 공약이 올라갑니다:</p>
    <table class="tbl">
      <tr><th>변경</th><th>공약 추가</th></tr>
      <tr><td>다른 문양</td><td>+2</td></tr>
      <tr><td>노트럼프(NT)</td><td>+1</td></tr>
      <tr><td>유지</td><td>없음</td></tr>
    </table>`;
  }
});

// L5: 프렌드 선택
lessons.push({
  render() {
    return `
    <h2>5. 프렌드 선택</h2>
    <p>주공은 자신의 파트너 <strong>프렌드</strong>를 지정합니다.</p>
    <table class="tbl">
      <tr><th>방법</th><th>설명</th></tr>
      <tr><td style="color:#FFD700">카드 지정</td><td>특정 카드 보유자</td></tr>
      <tr><td style="color:#FFD700">마이티</td><td>마이티 보유자</td></tr>
      <tr><td style="color:#FFD700">조커</td><td>조커 보유자</td></tr>
      <tr><td style="color:#4FC3F7">사람 지정</td><td>직접 플레이어 지목</td></tr>
      <tr><td style="color:#4FC3F7">초구 프렌드</td><td>첫 트릭 승자</td></tr>
      <tr><td style="color:#888">노프렌드</td><td>혼자 (점수 2배!)</td></tr>
    </table>
    <div class="info">프렌드는 해당 카드가 나올 때까지 <strong>비밀</strong>입니다.</div>`;
  }
});

// L6: 트릭 플레이 기초
lessons.push({
  render() {
    return `
    <h2>6. 트릭 플레이 기초</h2>
    <p>총 10번의 트릭을 플레이합니다. 매 트릭:</p>
    <ul>
      <li><strong>선(리더)</strong>이 카드 1장을 냅니다</li>
      <li>나머지가 순서대로 1장씩 냅니다</li>
      <li>가장 강한 카드 = 트릭 승리</li>
      <li>트릭 승자가 다음 선</li>
    </ul>
    <h3>핵심 규칙: 따라내기</h3>

// Rendering
const total = lessons.length;
let cur = 0;

function renderLesson() {
  const container = document.getElementById('lessons');
  container.innerHTML = `<div class="lesson active">${lessons[cur].render()}</div>`;
  if (lessons[cur].initQuiz) lessons[cur].initQuiz();
  updateNav();
  window.scrollTo(0, 0);
}

function updateNav() {
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === total - 1;
  document.getElementById('nextBtn').textContent = cur === total - 1 ? '완료!' : '다음 →';
  const pct = cur === 0 ? 0 : (cur / (total - 1)) * 100;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('stepInfo').textContent = cur === 0 ? '' : `${cur} / ${total - 1}`;
}

function go(n) { cur = n; renderLesson(); }
function next() { if (cur < total - 1) { cur++; renderLesson(); } }
function prev() { if (cur > 0) { cur--; renderLesson(); } }

renderLesson();
</script>
